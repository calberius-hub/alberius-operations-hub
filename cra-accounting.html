<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CRA Accounting Intake — Alberius Operations Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
:root {
  --bg: #f5f1ea;
  --surface: #faf8f3;
  --surface2: #f2ede3;
  --border: #cdcaba;
  --text: #1a1f1c;
  --text-dim: #2f3a33;
  --green: #5a8a5e;
  --red: #b24a3a;
  --yellow: #b9923e;
  --gold: #8c7342;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
  min-height: 100vh;
  padding: 24px;
}

.container {
  max-width: 980px;
  margin: 0 auto;
  display: grid;
  gap: 16px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}

.title {
  font-size: 22px;
  font-weight: 700;
}

.subtitle {
  font-size: 12px;
  color: var(--text-dim);
}

.intake-form {
  display: grid;
  gap: 12px;
}

.row {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.input, .select, .textarea {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  color: var(--text);
  font-size: 14px;
}

.textarea {
  resize: vertical;
  min-height: 90px;
}

.actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.btn {
  border: none;
  border-radius: 12px;
  padding: 12px 16px;
  font-weight: 600;
  cursor: pointer;
}

.btn-primary {
  background: var(--green);
  color: #fff;
}

.btn-secondary {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <div>
        <div class="title">CRA Accounting Intake</div>
        <div class="subtitle">Route invoices to job folders and vendors. Auto-create missing vendor folders when needed.</div>
      </div>
    </div>

    <form class="intake-form" id="cra-intake">
      <div class="row">
        <div class="field">
          <label class="label" for="vendor">Vendor</label>
          <input class="input" id="vendor" name="vendor" placeholder="Vendor name" />
        </div>
        <div class="field">
          <label class="label" for="job">Job</label>
          <select class="select" id="job" name="job">
            <option value="" disabled selected>Select job</option>
            <option>Job A</option>
            <option>Job B</option>
            <option>Job C</option>
          </select>
        </div>
        <div class="field">
          <label class="label" for="amount">Amount</label>
          <input class="input" id="amount" name="amount" type="number" step="0.01" placeholder="0.00" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label class="label" for="invoiceNumber">Invoice #</label>
          <input class="input" id="invoiceNumber" name="invoiceNumber" placeholder="Invoice number" />
        </div>
        <div class="field">
          <label class="label" for="date">Invoice Date</label>
          <input class="input" id="date" name="date" type="date" />
        </div>
        <div class="field">
          <label class="label" for="folder">Destination Folder</label>
          <input class="input" id="folder" name="folder" placeholder="Optional override" />
        </div>
      </div>

      <div class="field">
        <label class="label" for="notes">Notes</label>
        <textarea class="textarea" id="notes" name="notes" placeholder="Optional routing notes or exceptions"></textarea>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-secondary" id="resetBtn">Reset</button>
        <button type="submit" class="btn btn-primary">Save Intake</button>
      </div>
    </form>
  </div>
</div>

<script>
const form = document.getElementById('cra-intake');
const resetBtn = document.getElementById('resetBtn');

if (form) {
  form.addEventListener('submit', event => {
    event.preventDefault();
    const data = Object.fromEntries(new FormData(form).entries());
    console.log('CRA intake payload', data);
    alert('CRA intake saved locally for this demo. Backend routing to follow.');
  });
}

if (resetBtn) {
  resetBtn.addEventListener('click', () => form.reset());
}
</script>
</body>
</html>
