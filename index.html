<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alberius Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -1px;
      color: #fff;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .modules {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 320px;
      padding: 0 24px;
    }

    .module-btn {
      display: block;
      width: 100%;
      padding: 18px 24px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #f0f0f0;
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .module-btn:hover {
      background: #222;
      border-color: #3a3a3a;
    }

    .module-btn:active {
      background: #2a2a2a;
    }
  </style>
</head>
<body>

  <div class="brand">
    <div class="brand-mark">A</div>
    <span class="brand-name">Alberius Hub</span>
  </div>

  <div class="modules">
    <a href="https://rosemary-accounting.netlify.app" class="module-btn">
      Rosemary Accounting
    </a>
    <a href="https://rosemary-villas-finishes.netlify.app" class="module-btn">
      Rosemary Finishes &amp; Selections
    </a>
  </div>

</body>
</html>
